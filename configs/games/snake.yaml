extends:
  - ../base.yaml
  - ../presets/small.yaml

experiment:
  name: snake_jepa_dqn_small
  seed: 42
  device: auto
  precision: fp32

game:
  name: snake
  url: "file://games/snake/index.html"
  headless: true
  fps: 30
  action_repeat: 4
  max_steps_per_episode: 1000
  done_selector: "#status[data-state='done']"
  reset_key: Space

actions:
  type: discrete_keyboard
  repeat: 4
  keys:
    - noop
    - ArrowUp
    - ArrowDown
    - ArrowLeft
    - ArrowRight

reward:
  type: score_delta
  score_reader: dom
  score_selector: "#score"
  privileged: false

evaluation:
  episodes: 20
  deterministic: true
  record_video: true
  save_best_by: mean_score
