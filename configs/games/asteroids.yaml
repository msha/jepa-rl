extends:
  - ../base.yaml
  - ../presets/small.yaml

experiment:
  name: asteroids_jepa_dqn_small
  seed: 42
  device: auto
  precision: fp32

game:
  name: asteroids
  url: "file://games/asteroids/index.html"
  headless: true
  fps: 30
  action_repeat: 4
  max_steps_per_episode: 1000
  done_selector: "#status[data-state='done']"
  reset_key: Space

actions:
  type: discrete_keyboard
  repeat: 4
  keys:
    - noop
    - ArrowUp
    - ArrowLeft
    - ArrowRight
    - Space
    - ArrowUp+ArrowLeft
    - ArrowUp+ArrowRight
    - ArrowUp+Space
    - ArrowLeft+Space
    - ArrowRight+Space

reward:
  type: score_delta
  score_reader: dom
  score_selector: "#score"
  privileged: false

evaluation:
  episodes: 20
  deterministic: true
  record_video: true
  save_best_by: mean_score
