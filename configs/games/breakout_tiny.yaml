extends:
  - ../base.yaml
  - ../presets/tiny.yaml

experiment:
  name: breakout_tiny
  seed: 42
  device: auto
  precision: fp32

game:
  name: breakout
  url: "file://games/breakout/index.html"
  headless: true
  fps: 30
  action_repeat: 4
  max_steps_per_episode: 500
  done_selector: "#status[data-state='done']"
  reset_key: Space

actions:
  type: discrete_keyboard
  repeat: 4
  keys:
    - noop
    - ArrowLeft
    - ArrowRight
    - Space

reward:
  type: score_delta
  score_reader: dom
  score_selector: "#score"
  privileged: false
