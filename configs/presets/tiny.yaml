observation:
  width: 84
  height: 84
  grayscale: true

world_model:
  latent_dim: 128
  encoder:
    type: conv
    hidden_channels:
      - 16
      - 32
      - 64
  predictor:
    hidden_dim: 128
    depth: 2
    num_heads: 4

agent:
  batch_size: 64
  learning_starts: 1000
  q_network:
    hidden_dims:
      - 256

replay:
  capacity: 100000

training:
  passive_pretrain_steps: 1000
  total_env_steps: 10000
  learning_starts: 1000
  eval_interval_steps: 1000
  checkpoint_interval_steps: 1000
  planning_start_step: 0
  planning_eval_only_until: 0

