            - generic [ref=e192]:
              - generic [ref=e193]: Pixel DQN
              - generic [ref=e194]: End-to-end pixel Q-learning with dueling architecture, Double DQN, and epsilon-greedy exploration Pixel DQN learns directly from raw pixel frames. Uses a convolutional encoder to extract features, a dueling Q-network to estimate action values (separating state-value and advantage), Double DQN to reduce overestimation, and epsilon-greedy exploration that decays from random to greedy over time. Simple and reliable baseline.
            - generic [ref=e195]: observation
            - generic [ref=e196]:
              - generic [ref=e197]: 160×120 · color · 4 frames
              - generic [ref=e198]: Input resolution and format Input image resolution and format fed to the encoder. Smaller sizes train faster; grayscale reduces dimensionality; frame stacking provides temporal context so the agent can perceive motion.
            - generic [ref=e199]: obs width
            - generic [ref=e201] [cursor=pointer]: "160"
            - generic [ref=e202]: obs height
            - generic [ref=e204] [cursor=pointer]: "120"
            - generic [ref=e205]: grayscale
            - generic [ref=e206]:
              - generic [ref=e207] [cursor=pointer]: "no"
              - generic [ref=e208]: 1ch vs 3ch input Converts RGB input to single-channel grayscale, reducing the observation tensor from 3 channels to 1. Lower memory and faster training, but loses color information some games rely on.
            - generic [ref=e209]: frame stack
            - generic [ref=e210]:
              - generic [ref=e211] [cursor=pointer]: "4"
              - generic [ref=e212]: Frames per observation Number of consecutive frames stacked together as a single observation. Enables the agent to infer velocity and direction of moving objects from pixel differences between frames.
            - generic [ref=e213]: actions
            - generic [ref=e214]:
              - generic [ref=e215]: 6 actions
              - generic [ref=e216]: noop, ArrowLeft, ArrowRight, Space, ArrowLeft+Space, ArrowRight+Space Discrete keyboard actions the agent can take each step. Defined by the game's action space config (e.g. noop, left, right, fire for Breakout).
            - generic [ref=e217]: encoder
            - generic [ref=e218]:
              - generic [ref=e219]: conv [32→64→128→256]
              - generic [ref=e220]: Pixel-to-latent feature extractor Convolutional stack that converts raw pixel frames into a latent representation. Channel progression defines the depth and capacity of the feature extractor.
            - generic [ref=e221]: latent dim
            - generic [ref=e222]:
              - generic [ref=e223] [cursor=pointer]: "512"
              - generic [ref=e224]: "Latent space size Size of the latent embedding vector produced by the encoder. Higher dimensions capture more detail but increase memory and compute. Typical range: 128–512."
            - generic [ref=e225]: predictor
            - generic [ref=e226]:
              - generic [ref=e227]: transformer · depth 4 · 8 heads · dim 512
              - generic: Action-conditioned future predictor Transformer module that predicts future latent states given the current latent and a sequence of actions. Depth and heads control its capacity. Trained during JEPA world model pretraining.
            - generic [ref=e228]: q-network
            - generic [ref=e229]:
              - generic [ref=e230]: 512×512 · dueling
              - generic [ref=e231]: Action value estimator Fully-connected network that estimates action values (Q-values) from the latent representation. Dueling architecture separates state-value and advantage streams for more stable learning.
